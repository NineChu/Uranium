<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <link rel="shortcut icon" href="../../assets/icons/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/index.css" />
    <script src="js/index.js" defer></script>
    <title>Uranium</title>
  </head>
  <body>
    <header>
      <nav class="navbar">
        <ul>
          <li>
            <a href="https://github.com/NineChu">
              <span>NineChu</span>
            </a>
          </li>
          <li>
            <a href="https://github.com/NineChu/Uranium">
              <span>Uranium</span>
            </a>
          </li>
        </ul>
      </nav>
      <nav class="menu-bar">
        <ul>
          <li>
            <button id="buttonSettings">Settings</button>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <textarea id="textareaEditor" autofocus></textarea>
    </main>
    <!-- #region dialogs -->
    <dialog id="dialogSettings" closedby="any">
      <header>
        <h2>Settings</h2>
        <button id="buttonCloseSettings" class="close">
          <img src="../../assets/icons/close.png" alt="close.png" />
        </button>
      </header>
      <div class="inputs">
        <label>
          <span>Save text:</span>
          <input id="inputSettingSaveText" type="checkbox" />
        </label>
      </div>
    </dialog>
    <!-- #endregion -->
  </body>
</html>
