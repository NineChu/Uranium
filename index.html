<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <link rel="shortcut icon" href="assets/icons/favicon.ico" type="image/x-icon" />
    <title>Uranium | Redirecting...</title>
    <script>
      const prefferedVersion = JSON.parse(localStorage.getItem(`UraniumSettings`) || `{}`).prefferedVersion;

      if (prefferedVersion) {
        window.location.href = `versions/${prefferedVersion}`;
      } else {
        window.location.href = `versions/0`;
      }
    </script>
  </head>
  <body></body>
</html>
