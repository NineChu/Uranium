<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <link rel="stylesheet" href="css/index.css" />
    <script src="js/index.js" defer></script>
    <title>Uranium</title>
  </head>
  <body>
    <nav class="navbar">
      <ul>
        <li>
          <a href="https://github.com/NineChu">
            <h2>NineChu</h2>
          </a>
        </li>
        <li>
          <a href="https://github.com/NineChu/Uranium">
            <h2>Uranium</h2>
          </a>
        </li>
      </ul>
    </nav>
    <nav class="menu-bar">
      <ul>
        <li>
          <button id="buttonSettings">Configuration</button>
        </li>
      </ul>
    </nav>
    <main>
      <textarea id="textareaEditor" autofocus></textarea>
    </main>
    <dialog id="dialogSettings">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="buttonCloseSettings" class="close">
          <img src="assets/icons/close.png" alt="close.png" />
        </button>
      </div>
      <div class="inputs">
        <label>
          <span>Save text:</span>
          <input id="inputLocalstorageSetting" type="checkbox" />
        </label>
      </div>
    </dialog>
  </body>
</html>
